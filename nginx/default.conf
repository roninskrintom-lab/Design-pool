# ============================================================================
# aurastudio — nginx reverse proxy + SPA static
# Mounted into the web container at /etc/nginx/conf.d/default.conf
# ============================================================================

upstream app_upstream {
    server app:8080;
    keepalive 32;
}

# ----- HTTP -----
# In production behind a real domain, switch the `return 301` block on and
# move the `location` blocks into the HTTPS server below.
server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    # --- Uncomment to force HTTPS once certs/ is populated ---
    # return 301 https://$host$request_uri;

    root  /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json application/javascript
                      application/xml application/xml+rss text/javascript image/svg+xml;

    # Sensible body limits — bump if you start accepting uploads
    client_max_body_size 10m;

    # --- API → app container ---
    location /api/ {
        proxy_pass         http://app_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
    }

    # --- Long-cache hashed static assets ---
    location ~* \.(?:js|mjs|css|woff2?|ttf|eot|otf|ico|png|jpe?g|gif|svg|webp|avif|mp4|webm)$ {
        expires    30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files  $uri =404;
    }

    # PWA manifest + service worker should not be aggressively cached
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files  $uri =404;
    }

    # --- SPA fallback (wouter handles /, /app, etc. client-side) ---
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

