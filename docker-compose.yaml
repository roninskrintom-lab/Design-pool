# ============================================================================
# aurastudio — docker-compose
#   app : Node container running the Express API (bundled by esbuild)
#   web : Nginx serving the built SPA + reverse-proxying /api → app
#   db  : (optional) Postgres for local dev. In prod, point DATABASE_URL at
#         Neon / Supabase / RDS / etc. via .env and leave this commented out.
# ============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: aurastudio/app:latest
    container_name: aurastudio-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # DATABASE_URL is read from .env — point it at Neon in prod,
      # or at the `db` service below if you uncomment it.
    expose:
      - "8080"
    networks:
      - appnet
    # depends_on:
    #   db:
    #     condition: service_healthy
    healthcheck:
      # Adjust the path once you expose a real /api/healthz endpoint.
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: aurastudio/web:latest
    container_name: aurastudio-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - appnet

  # --------------------------------------------------------------------------
  # Optional: local Postgres. Uncomment and set POSTGRES_* in .env to use it.
  # In production prefer a managed provider (Neon, Supabase, RDS, etc.) — just
  # set DATABASE_URL in .env and keep this service commented out.
  # --------------------------------------------------------------------------
  # db:
  #   image: postgres:16-alpine
  #   container_name: aurastudio-db
  #   restart: unless-stopped
  #   env_file:
  #     - .env
  #   environment:
  #     POSTGRES_USER:     ${POSTGRES_USER:-postgres}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  #     POSTGRES_DB:       ${POSTGRES_DB:-aurastudio}
  #   volumes:
  #     - dbdata:/var/lib/postgresql/data
  #   networks:
  #     - appnet
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aurastudio}"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10

networks:
  appnet:
    driver: bridge

